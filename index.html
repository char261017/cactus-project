<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙人掌領養證明 - 檔名自動化版</title>
    <!-- 引入 html2pdf 函式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e0e0e0;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 右上角保存按鈕 */
        .save-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 25px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
            transition: all 0.2s;
        }
        .save-btn:hover { background-color: #219150; transform: scale(1.05); }

        .certificate-container {
            position: relative;
            width: 800px;
            height: 565px;
            background-image: url('image111.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .data-input {
            position: absolute;
            background: transparent;
            border: none;
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            outline: none;
            text-align: center;
        }

        .sig-wrapper {
            position: absolute;
            display: flex;
            align-items: center;
        }

        canvas { cursor: crosshair; border: 1px dashed #ccc; border-radius: 8px; box-sizing: border-box; }

        .clear-btn {
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ddd;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 4px;
            color: #666;
        }

        /* --- 位置參數 --- */
        .photo-slot {
            position: absolute; 
            left: 59px; top: 120px; width: 167px; height: 178px;
            border-radius: 12px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; overflow: hidden; z-index: 5; border: 1px dashed #ccc;
        }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 這裡的 .input-no 就是檔名的來源 */
        .input-no { left: 584px; top: 130px; width: 130px; }
        .input-days { left: 580px; top: 183px; width: 85px; }
        .input-year { left: 505px; top: 238px; width: 65px; }
        .input-month { left: 609px; top: 238px; width: 40px; }
        .input-day { left: 678px; top: 238px; width: 40px; }

        #wrapper-user { left: 330px; top: 290px; width: 420px; flex-direction: column; }
        #wrapper-user .clear-btn { margin-top: 5px; }
        #sig-user { width: 420px; height: 90px; }

        #wrapper-admin { right: 37px; bottom: 40px; width: 110px; flex-direction: column-reverse; }
        #wrapper-admin .clear-btn { margin-bottom: 5px; }
        #sig-admin { width: 110px; height: 70px; }

        /* PDF 輸出微調 */
        @media print {
            .clear-btn, .save-btn, #hint { display: none !important; }
            canvas, .photo-slot { border: none !important; }
        }
    </style>
</head>
<body>

<button class="save-btn" onclick="saveAsPDF()">💾 保存證明 (PDF)</button>

<div class="certificate-container" id="certificate">
    <div class="photo-slot" onclick="document.getElementById('upload').click()">
        <span id="hint" style="color: gray; font-size: 14px;">點擊照片</span>
        <img id="preview" style="display:none;">
    </div>
    <input type="file" id="upload" style="display:none" accept="image/*" onchange="previewImg(this)">

    <!-- 檔名會抓取這個 input 的值 -->
    <input type="text" class="data-input input-no" placeholder="編號">
    
    <input type="text" class="data-input input-days" placeholder="0">
    <input type="text" class="data-input input-year" placeholder="2026">
    <input type="text" class="data-input input-month" placeholder="05">
    <input type="text" class="data-input input-day" placeholder="03">

    <div class="sig-wrapper" id="wrapper-user">
        <canvas id="sig-user"></canvas>
        <div class="clear-btn" data-html2canvas-ignore onclick="clearSig('sig-user')">重簽</div>
    </div>

    <div class="sig-wrapper" id="wrapper-admin">
        <canvas id="sig-admin"></canvas>
        <div class="clear-btn" data-html2canvas-ignore onclick="clearSig('sig-admin')">重簽</div>
    </div>
</div>

<script>
    function saveAsPDF() {
        const element = document.getElementById('certificate');
        
        // 抓取編號輸入框的值
        const idNumber = document.querySelector('.input-no').value.trim() || "未命名";
        
        const opt = {
            margin:       0,
            filename:     `cactus_(${idNumber}).pdf`, // 自動化檔名
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, logging: false },
            jsPDF:        { unit: 'px', format: [800, 565], orientation: 'landscape' }
        };

        html2pdf().set(opt).from(element).save();
    }

    function previewImg(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('hint').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }

    function setupCanvas(canvasId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const resize = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#2c3e50';
        };
        resize();
        let drawing = false;
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const pos = getPos(e); ctx.moveTo(pos.x, pos.y); });
        canvas.addEventListener('mousemove', (e) => { if (!drawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); });
        window.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); const pos = getPos(e); ctx.moveTo(pos.x, pos.y); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { if (!drawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); e.preventDefault(); }, {passive: false});
    }

    setupCanvas('sig-user');
    setupCanvas('sig-admin');

    function clearSig(id) {
        const canvas = document.getElementById(id);
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }
</script>

</body>
</html>
